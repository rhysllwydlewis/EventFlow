<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test</title>
  <script>
    // Intercept redirect from auth guard
    const origLoc = window.location;
    Object.defineProperty(window, 'location', {
      get() { return { ...origLoc, assign: ()=>{}, replace: ()=>{}, href: origLoc.href }; },
      configurable: true
    });
  </script>
</head>
<body>
  <script>
    // redirect dashboard-supplier.html inline — just load it with fetch and inject
    fetch('/dashboard-supplier.html').then(r=>r.text()).then(html => {
      // Remove auth guard script to avoid redirect
      html = html.replace(/<script[^>]*dashboard-supplier-auth[^>]*><\/script>/g, '');
      document.open(); document.write(html); document.close();
    });
  </script>
</body>
</html>
